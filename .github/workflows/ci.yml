name: "CI - Build, Lint, Test"

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend Lint (ruff + black)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install lint tools
        run: pip install ruff black

      - name: ruff check
        run: ruff check .

      - name: black (format check)
        run: black --check .

  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      APP_ENV: eval
      LOG_LEVEL: warning
      FRONTEND_BASE_URL: http://localhost:3000
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: eval-placeholder-service-role
      PHASE1_SKIP_SUPABASE_STARTUP_CHECK: "true"
      # LLM keys are not used in eval / unit tests; set to non-empty placeholders
      GEMINI_API_KEY: placeholder-gemini
      GROQ_API_KEY: placeholder-groq

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  frontend-typecheck:
    name: Frontend TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: ESLint check
        run: npm run lint

  build-docker:
    name: Build Docker Image (backend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (backend stage)
        run: docker build --target backend -t groww-ops-backend:ci .
