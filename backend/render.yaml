# DEPRECATED — Railway is the active deploy target.
# See railway.toml at repo root. This file is kept for reference only.
services:
  - type: web
    name: indmoney-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DEFAULT_TIMEZONE
        value: Asia/Kolkata